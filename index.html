<pre id="eew">読み込み中...</pre>

<script>
// 警報・注意報に「レベル〇」の接頭語をつけた定義マップ
const warnAreaDefinition = {
  "02": { name: "レベル３暴風雪警報", level: 3 },
  "03": { name: "レベル３大雨警報", level: 3 },
  "04": { name: "レベル３洪水警報", level: 3 },
  "05": { name: "レベル３暴風警報", level: 3 },
  "06": { name: "レベル３大雪警報", level: 3 },
  "07": { name: "レベル３波浪警報", level: 3 },
  "08": { name: "レベル３高潮警報", level: 3 },
  "09": { name: "レベル３土砂災害警報", level: 3 },
  "10": { name: "レベル２大雨注意報", level: 2 },
  "12": { name: "レベル２大雪注意報", level: 2 },
  "13": { name: "レベル２風雪注意報", level: 2 },
  "14": { name: "レベル２雷注意報", level: 2 },
  "15": { name: "レベル２強風注意報", level: 2 },
  "16": { name: "レベル２波浪注意報", level: 2 },
  "17": { name: "レベル２融雪注意報", level: 2 },
  "18": { name: "レベル２洪水注意報", level: 2 },
  "19": { name: "レベル２高潮注意報", level: 2 },
  "20": { name: "レベル２濃霧注意報", level: 2 },
  "21": { name: "レベル２乾燥注意報", level: 2 },
  "22": { name: "レベル２なだれ注意報", level: 2 },
  "23": { name: "レベル２低温注意報", level: 2 },
  "24": { name: "レベル２霜注意報", level: 2 },
  "25": { name: "レベル２着氷注意報", level: 2 },
  "26": { name: "レベル２着雪注意報", level: 2 },
  "27": { name: "レベル２その他の注意報", level: 2 },
  "29": { name: "レベル２土砂災害注意報", level: 2 },
  "32": { name: "レベル５暴風雪特別警報", level: 5 },
  "33": { name: "レベル５大雨特別警報", level: 5 },
  "35": { name: "レベル５暴風特別警報", level: 5 },
  "36": { name: "レベル５大雪特別警報", level: 5 },
  "37": { name: "レベル５波浪特別警報", level: 5 },
  "38": { name: "レベル５高潮特別警報", level: 5 },
  "39": { name: "レベル５土砂災害特別警報", level: 5 },
  "43": { name: "レベル４大雨危険警報", level: 4 },
  "48": { name: "レベル４高潮危険警報", level: 4 },
  "49": { name: "レベル４土砂災害危険警報", level: 4 }
};

function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const HH = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("updateTime").textContent = `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

async function update() {
  setNowTime();
  
  const modeVal = document.querySelector('input[name="mode"]:checked').value;
  let modeLevel = 2;
  if (modeVal === "all") modeLevel = 2;
  if (modeVal === "keihou") modeLevel = 3;
  if (modeVal === "kiken_keihou") modeLevel = 4;

  const areaSelect = document.getElementById("areaSelect").value;
  
  await main(modeLevel, areaSelect);
}

async function main(modeLevel = 3, taisho_chiiki = "全国") {
  try {
    // XMLフィードから最新の気象警報・注意報をパースして取得
    const { warnData, reportDatetime } = await parseJmaXmlData();

    const dt = new Date(reportDatetime);
    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');

    let titleKind = "";
    if (modeLevel === 2) titleKind = "気象警報・注意報";
    else if (modeLevel === 3) titleKind = "気象警報";
    else if (modeLevel === 4) titleKind = "気象危険/特別警報";

    let titleArea1 = (taisho_chiiki === "全国") ? "全国の" : "";
    let titleArea2 = (taisho_chiiki === "全国") ? "" : "\n" + taisho_chiiki;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${MM}月${dd}日${HH}時${mm}分 発表`;
    let count = 0;

    // 定義されている警報・注意報をループして出力用テキストを作成
    for (const code in warnAreaDefinition) {
      const info = warnAreaDefinition[code];
      if (info.level < modeLevel) continue;

      const customWarnName = info.name; // 「レベル３大雨警報」など
      const areas = warnData[customWarnName];
      if (!areas || Object.keys(areas).length === 0) continue;

      let block = "";
      let hasArea = false;

      for (const areaName in areas) {
        // 地域フィルタ（全国、または選択された一次細分区域名が一致する場合）
        if (taisho_chiiki !== "全国" && areaName !== taisho_chiiki) continue;

        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;

        if (!hasArea) {
          const color = getWarnColor(info.level);
          block += `\n\n${color}${customWarnName}${color}`;
          hasArea = true;
          count++;
        }

        block += `\n【${areaName}】\n`;
        block += cities.join("　");
      }

      text += block;
    }

    if (count === 0) {
      if (modeLevel === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (modeLevel === 3) text += "\n\n発表中の気象警報はありません。";
      else if (modeLevel === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch(e) {
    document.getElementById("eew").textContent = "エラーが発生しました:\n" + e;
  }
}

/**
 * 気象庁の防災情報XMLをフェッチし、警戒レベル付きの名称に紐づけてパースする関数
 */
async function parseJmaXmlData() {
  // 気象庁XML 高頻度フィード (例として随時発表用のextra.xmlを指定)
  // ※ ブラウザから直接アクセスする場合は、CORS（クロスドメイン制限）を回避するために
  // プロキシを通すか、自身のサーバーに一度保存したXMLファイルを指定してください。
  const xmlUrl = 'https://www.data.jma.go.jp/developer/xml/feed/extra.xml'; 
  
  const res = await fetch(xmlUrl);
  const xmlText = await res.text();
  
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(xmlText, "text/xml");
  
  // 発表時刻の取得
  const reportDatetimeEle = xmlDoc.getElementsByTagName("ReportDateTime")[0] || xmlDoc.getElementsByTagName("DateTime")[0];
  const reportDatetime = reportDatetimeEle ? reportDatetimeEle.textContent : new Date().toISOString();

  // 警報データを格納するオブジェクト
  const warnData = {};

  // XML内のItem要素（地域ごとの警報情報）をループ
  const items = xmlDoc.getElementsByTagName("Item");
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    
    // 親地域名（都道府県名や地方名、例:「東京都」や「石狩・空知・後志地方」）の取得
    const areaNameEle = item.getElementsByTagName("Area")[0]?.getElementsByTagName("Name")[0];
    if (!areaNameEle) continue;
    const parentAreaName = areaNameEle.textContent;

    // 警報・注意報の種類（Kind）を走査
    const kinds = item.getElementsByTagName("Kind");
    for (let j = 0; j < kinds.length; j++) {
      const kind = kinds[j];
      const nameEle = kind.getElementsByTagName("Name")[0];
      const statusEle = kind.getElementsByTagName("Status")[0];
      
      if (!nameEle) continue;
      let rawWarnName = nameEle.textContent; // 気象庁XML本来の名称 (例: "大雨警報")

      // XMLから取得した警報名に「レベル〇」がついていない場合、自動で付与してプログラム内部の定義名に揃える
      let customWarnName = rawWarnName;
      if (!customWarnName.startsWith("レベル")) {
        // 例: 「大雨警報」 -> 「レベル３大雨警報」に変換するためのマッピング用逆引き
        for (const code in warnAreaDefinition) {
          const def = warnAreaDefinition[code];
          if (def.name.endsWith(rawWarnName)) {
            customWarnName = def.name;
            break;
          }
        }
      }

      // 発表状態の確認。解除されているもの、または該当なしはスキップ
      const status = statusEle ? statusEle.textContent : "";
      if (status.includes("解除") || status.includes("なし")) continue;

      // 市区町村などの詳細地域（Areas > Area）を収集
      const subAreas = item.getElementsByTagName("Areas")[0]?.getElementsByTagName("Area");
      const cityNames = [];
      
      if (subAreas && subAreas.length > 0) {
        for (let k = 0; k < subAreas.length; k++) {
          const subName = subAreas[k].getElementsByTagName("Name")[0]?.textContent;
          if (subName) cityNames.push(subName);
        }
      } else {
        cityNames.push(parentAreaName);
      }

      if (cityNames.length > 0) {
        if (!warnData[customWarnName]) {
          warnData[customWarnName] = {};
        }
        if (!warnData[customWarnName][parentAreaName]) {
          warnData[customWarnName][parentAreaName] = [];
        }
        // 重複を防ぎながら市区町村名を追加
        cityNames.forEach(city => {
          if (!warnData[customWarnName][parentAreaName].includes(city)) {
            warnData[customWarnName][parentAreaName].push(city);
          }
        });
      }
    }
  }

  return { warnData, reportDatetime };
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨"; // 注意報
    case 3: return "🟥"; // 警報
    case 4: return "🟪"; // 危険警報 (土砂災害危険警報など)
    case 5: return "⬛️"; // 特別警報
    default: return "◆";
  }
}

// 初期化およびイベントリスナーの登録
window.addEventListener("load", update);

document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = document.getElementById("eew").textContent;
  try {
    await navigator.clipboard.writeText(text);
    alert("コピー完了");
  } catch(e) {
    alert("ERROR\n" + e);
  }
});

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", update);
});

document.getElementById("areaSelect").addEventListener("change", update);
</script>
