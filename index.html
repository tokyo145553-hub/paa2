```html
<!-- =========================
 気象警報ビューア XML版
 map.json → XML feed対応
========================= -->

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>気象情報ビューアー XML版</title>

<style>

body{
  font-family:
  "Yu Gothic","YuGothic",
  "メイリオ",sans-serif;

  margin:5px;
  background:#fff;
}

#eew{
  white-space:pre-wrap;
  font-size:18px;
  line-height:1.6;
}

button{
  margin-top:10px;
  padding:8px 14px;
  font-size:16px;
}

#updateTime{
  color:#666;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div id="updateTime"></div>

<div id="eew">取得中...</div>

<button id="copyBtn">
コピー
</button>

<script>

// ===============================
// 現在時刻表示
// ===============================

function setNowTime(){

  const now = new Date();

  const YYYY = now.getFullYear();

  const MM =
  String(now.getMonth()+1)
  .padStart(2,'0');

  const dd =
  String(now.getDate())
  .padStart(2,'0');

  const HH =
  String(now.getHours())
  .padStart(2,'0');

  const mm =
  String(now.getMinutes())
  .padStart(2,'0');

  const ss =
  String(now.getSeconds())
  .padStart(2,'0');

  document.getElementById(
    "updateTime"
  ).textContent =

  `取得日時:
  ${YYYY}/${MM}/${dd}
  ${HH}:${mm}:${ss}`;

}

// ===============================
// 色
// ===============================

function getWarnColor(level){

  if(level===5) return "🟪";
  if(level===4) return "🟥";
  if(level===3) return "🟧";
  if(level===2) return "🟨";

  return "";

}

// ===============================
// メイン
// ===============================

async function main(mode=2){

try{

// ===============================
// 警報レベル
// ===============================

const warnArea = {

"暴風雪特別警報":5,
"大雨特別警報":5,
"暴風特別警報":5,
"大雪特別警報":5,
"波浪特別警報":5,
"高潮特別警報":5,

"大雨危険警報":4,
"高潮危険警報":4,

"暴風雪警報":3,
"大雨警報":3,
"洪水警報":3,
"暴風警報":3,
"大雪警報":3,
"波浪警報":3,
"高潮警報":3,

"大雨注意報":2,
"洪水注意報":2,
"大雪注意報":2,
"風雪注意報":2,
"雷注意報":2,
"強風注意報":2,
"波浪注意報":2,
"濃霧注意報":2,
"乾燥注意報":2

};

// ===============================
// XML取得
// ===============================

const result =
await getCityWarningsByArea();

// ===============================
// 発表時刻
// ===============================

const dt =
new Date(result.reportDateTime);

const MM =
String(dt.getMonth()+1)
.padStart(2,'0');

const dd =
String(dt.getDate())
.padStart(2,'0');

const HH =
String(dt.getHours())
.padStart(2,'0');

const mm =
String(dt.getMinutes())
.padStart(2,'0');

// ===============================
// タイトル
// ===============================

let titleKind = "";

if(mode===2)
titleKind="気象警報・注意報";

if(mode===3)
titleKind="気象警報";

if(mode===4)
titleKind="気象危険・特別警報";

// ===============================
// 本文
// ===============================

let text =

`《${titleKind}》
${MM}月${dd}日
${HH}時${mm}分 発表`;

let count = 0;

// ===============================
// 警報ループ
// ===============================

for(const warnName in result.warnInfo){

  const level =
  warnArea[warnName];

  if(!level) continue;

  if(level < mode)
  continue;

  const areas =
  result.warnInfo[warnName];

  if(areas.length===0)
  continue;

  count++;

  text +=

`\n\n
${getWarnColor(level)}
${warnName}
${getWarnColor(level)}\n`;

  text += areas.join("　");

}

// ===============================
// なし
// ===============================

if(count===0){

  text +=
  "\n\n発表中の情報はありません。";

}

// ===============================
// 表示
// ===============================

document.getElementById(
"eew"
).textContent = text;

}catch(e){

document.getElementById(
"eew"
).textContent =

"取得失敗\n\n"+e;

console.error(e);

}

}

// ===============================
// XML取得関数
// ===============================

async function getCityWarningsByArea(){

// feed
const FEED_URL =

"https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

// parser
const parser =
new DOMParser();

// feed取得
const feedRes =
await fetch(FEED_URL);

const feedText =
await feedRes.text();

const feedXml =

parser.parseFromString(
feedText,
"application/xml"
);

// entry一覧
const entries =

[
...feedXml.querySelectorAll(
"entry"
)
];

// 最新警報XML検索
const targetEntry =

entries.find(entry=>{

const title =

entry.querySelector("title")
?.textContent || "";

return(

title.includes(
"気象特別警報・警報・注意報"
)

);

});

// 見つからない
if(!targetEntry){

throw new Error(
"警報XMLなし"
);

}

// XML URL
const xmlUrl =

targetEntry
.querySelector("id")
.textContent;

// XML取得
const xmlRes =
await fetch(xmlUrl);

const xmlText =
await xmlRes.text();

const xml =

parser.parseFromString(
xmlText,
"application/xml"
);

// 発表時刻
const reportDateTime =

xml.querySelector(
"ReportDateTime"
)?.textContent;

// 結果
const warnInfo = {};

// Item一覧
const items =

xml.querySelectorAll(
"Item"
);

// 解析
items.forEach(item=>{

// 地域
const area =

item.querySelector(
"Area Name"
)?.textContent;

if(!area) return;

// Kind一覧
const kinds =

item.querySelectorAll(
"Kind"
);

// 種別
kinds.forEach(kind=>{

const name =

kind.querySelector(
"Name"
)?.textContent;

if(!name) return;

// 配列作成
if(!warnInfo[name]){

warnInfo[name] = [];

}

// 重複防止
if(

!warnInfo[name]
.includes(area)

){

warnInfo[name]
.push(area);

}

});

});

// return
return{

reportDateTime,
warnInfo

};

}

// ===============================
// 起動
// ===============================

setNowTime();

main();

// ===============================
// 自動更新
// ===============================

setInterval(()=>{

setNowTime();

main();

},60000);

// ===============================
// コピー
// ===============================

document
.getElementById("copyBtn")
.addEventListener(
"click",
()=>{

navigator.clipboard.writeText(

document
.getElementById("eew")
.textContent

);

}
);

</script>
</body>
</html>
```
