<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[新式]気象警報ビューアーv1.2.0</title>
<style>
body {
  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;
  white-space: pre-wrap;
  margin: 5px;
  padding: 5px;
  background: #fff;
  font-size: 14px;

}
#eew {

  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-wrap: anywhere;
}
#copyBtn {
  font-size: 12px;

  margin-bottom: 0px;

}
#areaSelect {
  font-size: 12px;
  padding: 10px 10px;
  margin-bottom: 0px;
  cursor: pointer;
}
.hidden {
  display: none;
}
</style>
</head>
<body>

  <optgroup label="東海地方">

  <optgroup label="四国地方">
    <option value="360000">徳島県</option>

  </optgroup>
  <optgroup label="九州北部地方">
    <option value="400000">福岡県</option>
    <option value="410000">佐賀県</option>
    <option value="420000">長崎県</option>
    <option value="430000">熊本県</option>

  </optgroup>
  <optgroup label="九州南部・奄美地方">
    <option value="450000">宮崎県</option>
    <option value="460100">鹿児島県（奄美除く）</option>
    <option value="460040">奄美地方</option>
  </optgroup>
  <optgroup label="沖縄地方">
    <option value="471000">沖縄本島地方</option>
    <option value="472000">大東島地方</option>
    <option value="473000">宮古島地方</option>
    <option value="474000">八重山地方</option>
  </optgroup>
</select>

<label><input type="radio" name="mode" value="2"> 全情報</label>
<label><input type="radio" name="mode" value="3" checked> 警報以上</label>
<label><input type="radio" name="mode" value="4"> 危険警報以上</label>

<pre id="eew">読み込み中...</pre>

<script>
// 新式レベル定義マスター
const warnArea = {
  "00":{name:"解除",level:null},
  "02":{name:"暴風雪警報",level:3},
  "03":{name:"レベル３大雨警報",level:3},
  "04":{name:"洪水警報",level:3},
  "05":{name:"暴風警報",level:3},
  "06":{name:"大雪警報",level:3},
  "07":{name:"波浪警報",level:3},
  "08":{name:"レベル３高潮警報",level:3},
  "09":{name:"レベル３土砂災害警報",level:3},
  "10":{name:"レベル２大雨注意報",level:2},
  "12":{name:"大雪注意報",level:2},
  "13":{name:"風雪注意報",level:2},
  "14":{name:"雷注意報",level:2},
  "15":{name:"強風注意報",level:2},
  "16":{name:"波浪注意報",level:2},
  "17":{name:"融雪注意報",level:2},
  "18":{name:"洪水注意報",level:2},
  "19":{name:"レベル２高潮注意報",level:2},
  "20":{name:"濃霧注意報",level:2},
  "21":{name:"乾燥注意報",level:2},
  "22":{name:"なだれ注意報",level:2},
  "23":{name:"低温注意報",level:2},
  "24":{name:"霜注意報",level:2},
  "25":{name:"着氷注意報",level:2},
  "26":{name:"着雪注意報",level:2},
  "27":{name:"その他の注意報",level:2},
  "29":{name:"レベル２土砂災害注意報",level:2},
  "32":{name:"暴風雪特別警報",level:5},
  "33":{name:"レベル５大雨特別警報",level:5},
  "35":{name:"暴風特別警報",level:5},
  "36":{name:"大雪特別警報",level:5},
  "37":{name:"波浪特別警報",level:5},
  "38":{name:"レベル５高潮特別警報",level:5},
  "39":{name:"レベル５土砂災害特別警報",level:5},
  "43":{name:"レベル４大雨危険警報",level:4},
  "48":{name:"レベル４高潮危険警報",level:4},
  "49":{name:"レベル４土砂災害危険警報",level:4}
};

function setNowTime() {
  const now = new Date();
  document.getElementById("updateTime").textContent = `取得日時: ${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
}

function getWarnColor(level) {
  if (level >= 5) return "【特別警報】";
  if (level === 4) return "【危険警報】";
  if (level === 3) return "【警報】";
  return "【注意報】";
}

// 気象庁の地域コードマッピング簡易マスター
const areaCodeMap = {
  "0160": "石狩・空知・後志地方", "0110": "宗谷地方", "0120": "上川・留萌地方", "0130": "網走・北見・紋別地方",
  "0140": "十勝地方", "0141": "釧路・根室地方", "0150": "胆振・日高地方", "0170": "渡島・檜山地方",
  "020000": "青森県", "030000": "岩手県", "040000": "宮城県", "050000": "秋田県", "060000": "山形県", "070000": "福島県",
  "080000": "茨城県", "090000": "栃木県", "100000": "群馬県", "110000": "埼玉県", "120000": "千葉県", "130000": "東京都", "140000": "神奈川県",
  "150000": "新潟県", "160000": "富山県", "170000": "石川県", "180000": "福井県", "190000": "山梨県", "200000": "長野県",
  "210000": "岐阜県", "220000": "静岡県", "230000": "愛知県", "240000": "三重県", "250000": "滋賀県", "260000": "京都府",
  "270000": "大阪府", "280000": "兵庫県", "290000": "奈良県", "300000": "和歌山県", "310000": "鳥取県", "320000": "島根県",
  "330000": "岡山県", "340000": "広島県", "350000": "山口県", "360000": "徳島県", "370000": "香川県", "380000": "愛媛県",
  "390000": "高知県", "400000": "福岡県", "410000": "佐賀県", "420000": "長崎県", "430000": "熊本県", "440000": "大分県",
  "450000": "宮崎県", "460100": "鹿児島県（奄美除く）", "460040": "奄美地方", "471000": "沖縄本島地方", "472000": "大東島地方",
  "473000": "宮古島地方", "474000": "八重山地方"
};

async function main() {
  const mode = parseInt(document.querySelector('input[name="mode"]:checked').value);
  const areaSelect = document.getElementById("areaSelect");
  const selectedValue = areaSelect.value; 
  const selectedText = areaSelect.options[areaSelect.selectedIndex].text;

  try {
    setNowTime();
    document.getElementById("eew").textContent = "読み込み中...";

    // 気象庁の現在の警報・注意報発表状況JSONを取得
    const res = await fetch('https://www.jma.go.jp/bosai/warning/data/warning/map.json');
    const dataJson = await res.json();

    // 最新の発表日時を取得
    let reportDtStr = new Date().toISOString();
    if(dataJson.length > 0 && dataJson[0].reportDatetime) {
      reportDtStr = dataJson[0].reportDatetime;
    }
    const dt = new Date(reportDtStr);
    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');

    let titleKind = mode === 2 ? "気象警報・注意報" : mode === 3 ? "気象警報以上" : "気象危険/特別警報";
    let titleArea = selectedValue === "全国" ? "全国の" : `\n${selectedText}`;
    let text = `《${selectedValue === "全国" ? "" : "地域限定:"}${titleArea}${titleKind}》\n${MM}月${dd}日${HH}時${mm}分 更新\n`;

    // 情報を整理するオブジェクト
    // { "レベル４大雨危険警報": { "東京都": ["新宿区", "渋谷区"] } }
    const summary = {};

    // APIデータを解析
    for (const areaData of dataJson) {
      const cityCode = areaData.code; // 市町村コード (例: "1310400")
      
      // 地域フィルタリング
      if (selectedValue !== "全国") {
        if (selectedValue.length === 4) { // 北海道の振興局など
          if (!cityCode.startsWith(selectedValue)) continue;
        } else if (selectedValue === "460100") { // 鹿児島（奄美除く）
          if (!cityCode.startsWith("46") || cityCode.startsWith("460040")) continue;
        } else { // 通常の都道府県コードなど
          if (!cityCode.startsWith(selectedValue.substring(0, 2))) continue;
        }
      }

      // 該当自治体の警報情報を走査
      if (areaData.components) {
        for (const kindCode of areaData.components) {
          const info = warnArea[kindCode];
          if (!info || info.level === null || info.level < mode) continue;

          // 自治体名（APIから取得、または簡易フォールバック）
          const cityName = areaData.name || cityCode; 
          // 所属する親の大地域名を取得
          let parentAreaName = "その他地域";
          for (const code in areaCodeMap) {
            if (cityCode.startsWith(code.substring(0, 4))) {
              parentAreaName = areaCodeMap[code];
              break;
            }
          }

          if (!summary[info.name]) summary[info.name] = {};
          if (!summary[info.name][parentAreaName]) summary[info.name][parentAreaName] = [];
          
          if (!summary[info.name][parentAreaName].includes(cityName)) {
            summary[info.name][parentAreaName].push(cityName);
          }
        }
      }
    }

    // テキスト出力構築
    let count = 0;
    // 警報マスターの順序（重い順）に並び替えて出力
    const sortedWarnNames = Object.keys(warnArea).map(k => warnArea[k].name);
    
    for (const warnName of sortedWarnNames) {
      if (!summary[warnName]) continue;
      const targetWarn = Object.values(warnArea).find(w => w.name === warnName);
      
      text += `\n\n${getWarnColor(targetWarn.level)}${warnName}${getWarnColor(targetWarn.level)}`;
      
      for (const pName in summary[warnName]) {
        text += `\n【${pName}】\n`;
        text += summary[warnName][pName].join("　");
      }
      count++;
    }

    if (count === 0) {
      text += `\n\n発表中の${titleKind}はありません。`;
    }

    document.getElementById("eew").textContent = text.trim();
  } catch (e) {
    document.getElementById("eew").textContent = "エラーが発生しました:\n" + e.message;
    console.error(e);
  }
}

// イベントリスナーの設定
document.getElementById("areaSelect").addEventListener("change", main);
document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", main);
});

document.getElementById("copyBtn").addEventListener("click", () => {
  const text = document.getElementById("eew").textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert("本文をコピーしました！");
  }).catch(() => {
    alert("コピーに失敗しました。");
  });
});

// 初回実行
window.addEventListener("load", main);
</script>
</body>
</html>
