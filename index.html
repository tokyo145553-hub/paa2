<body>

<label><input type="radio" name="mode" value="all"> 全情報</label>
<label><input type="radio" name="mode" value="keihou" checked> 警報以上</label>
<label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>

<pre id="eew">読み込み中...</pre>

<script>
// 気象庁高頻度更新フィード対象の全58気象台・予報区コードマップ
const areaCodeMap = {
  "石狩・空知・後志地方": ["016010"], "宗谷地方": ["011000"], "上川・留萌地方": ["012000"],
  "網走・北見・紋別地方": ["013000"], "十勝地方": ["014030"], "釧路・根室地方": ["014010"],
  "胆振・日高地方": ["015000"], "渡島・檜山地方": ["017000"],
  "青森県": ["020000"], "岩手県": ["030000"], "宮城県": ["040000"], "秋田県": ["050000"], "山形県": ["060000"], "福島県": ["070000"],
  "茨城県": ["080000"], "栃木県": ["090000"], "群馬県": ["100000"], "埼玉県": ["110000"], "千葉県": ["120000"], "東京都": ["130000"], "神奈川県": ["140000"], "山梨県": ["190000"], "長野県": ["200000"],
  "岐阜県": ["210000"], "静岡県": ["220000"], "愛知県": ["230000"], "三重県": ["240000"],
  "新潟県": ["150000"], "富山県": ["160000"], "石川県": ["170000"], "福井県": ["180000"],
  "滋賀県": ["250000"], "京都府": ["260000"], "大阪府": ["270000"], "兵庫県": ["280000"], "奈良県": ["290000"], "和歌山県": ["300000"],
  "鳥取県": ["310000"], "島根県": ["320000"], "岡山県": ["330000"], "広島県": ["340000"], "山口県": ["350000"],
  "徳島県": ["360000"], "香川県": ["370000"], "愛媛県": ["380000"], "高知県": ["390000"],
  "福岡県": ["400000"], "佐賀県": ["410000"], "長崎県": ["420000"], "熊本県": ["430000"], "大分県": ["440000"], "宮崎県": ["450000"],
  "鹿児島県（奄美地方を除く）": ["460100"], "奄美地方（鹿児島県）": ["460040"],
  "沖縄本島地方": ["471000"], "大東島地方": ["472000"], "宮古島地方": ["473000"], "八重山地方": ["474000"]
};

function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const HH = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("updateTime").textContent = `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

setNowTime();

function update() {
  const modeVal = document.querySelector('input[name="mode"]:checked').value;
  let modeNum = 2;
  if (modeVal === "keihou") modeNum = 3;
  if (modeVal === "kiken_keihou") modeNum = 4;

  const selectEl = document.getElementById("areaSelect");
  const taisho_chiiki = selectEl.value;
  
  main(modeNum, taisho_chiiki);
}

document.querySelectorAll('input[name="mode"]').forEach(radio => radio.addEventListener("change", update));
document.getElementById("areaSelect").addEventListener("change", update);
window.addEventListener("load", update);

async function main(mode=2, taisho_chiiki="全国") {
  try {
    const warnArea = {
      "00":{name:"解除",level:null}, "02":{name:"暴風雪警報",level:3}, "03":{name:"レベル３大雨警報",level:3},
      "04":{name:"洪水警報",level:3}, "05":{name:"暴風警報",level:3}, "06":{name:"大雪警報",level:3},
      "07":{name:"波浪警報",level:3}, "08":{name:"レベル３高潮警報",level:3}, "09":{name:"レベル３土砂災害警報",level:3},
      "10":{name:"レベル２大雨注意報",level:2}, "12":{name:"大雪注意報",level:2}, "13":{name:"風雪注意報",level:2},
      "14":{name:"雷注意報",level:2}, "15":{name:"強風注意報",level:2}, "16":{name:"波浪注意報",level:2},
      "17":{name:"融雪注意報",level:2}, "18":{name:"洪水注意報",level:2}, "19":{name:"レベル２高潮注意報",level:2},
      "20":{name:"濃霧注意報",level:2}, "21":{name:"乾燥注意報",level:2}, "22":{name:"なだれ注意報",level:2},
      "23":{name:"低温注意報",level:2}, "24":{name:"霜注意報",level:2}, "25":{name:"着氷注意報",level:2},
      "26":{name:"着雪注意報",level:2}, "27":{name:"その他の注意報",level:2}, "29":{name:"レベル２土砂災害注意報",level:2},
      "32":{name:"暴風雪特別警報",level:5}, "33":{name:"レベル５大雨特別警報",level:5}, "35":{name:"暴風特別警報",level:5},
      "36":{name:"大雪特別警報",level:5}, "37":{name:"波浪特別警報",level:5}, "38":{name:"レベル５高潮特別警報",level:5},
      "39":{name:"レベル５土砂災害特別警報",level:5}, "42":{name:"未定・予約",level:null}, "43":{name:"レベル４大雨危険警報",level:4},
      "45":{name:"未定・予約",level:null}, "46":{name:"未定・予約",level:null}, "47":{name:"未定・予約",level:null},
      "48":{name:"レベル４高潮危険警報",level:4}, "49":{name:"レベル４土砂災害危険警報",level:4}
    };

    document.getElementById("eew").textContent = "データを読み込み中...";

    const { warnData, regionReportDT } = await getCityWarningsByArea(warnArea, taisho_chiiki);

    const dt = new Date(regionReportDT || Date.now());
    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');

    let titleKind = "";
    if (mode === 2) titleKind = "気象警報・注意報";
    else if (mode === 3) titleKind = "気象警報";
    else if (mode === 4) titleKind = "気象危険/特別警報";

    let titleArea1 = ""; let titleArea2 = "";
    if (taisho_chiiki === "全国") titleArea1 = "全国の";
    else titleArea2 = "\n" + taisho_chiiki;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${MM}月${dd}日${HH}時${mm}分`;
    if (regionReportDT) text += " 発表";
    else text += " 更新";
    
    let count = 0;

    for (const warnName in warnData) {
      const areas = warnData[warnName];
      if (Object.keys(areas).length === 0) continue;

      const info = Object.values(warnArea).find(w => w.name === warnName);
      if (!info || info.level < mode) continue;

      let block = "";
      let hasArea = false;

      for (const areaName in areas) {
        if (taisho_chiiki !== "全国" && areaName !== taisho_chiiki) continue;
        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;

        if (!hasArea) {
          const coloredName = `${getWarnColor(info.level)}${warnName}${getWarnColor(info.level)}`;
          block += `\n\n${coloredName}`;
          hasArea = true;
          count++;
        }

        block += `\n【${areaName}】\n`;
        block += cities.join("　");
      }

      text += block;
    }

    if (count === 0) {
      if (mode === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (mode === 3) text += "\n\n発表中の気象警報はありません。";
      else if (mode === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch (e) {
    document.getElementById("eew").textContent = "エラーが発生しました:\n" + e;
  }
}

// 府県・管轄ごとのJSONファイルを動的に取得して合算する関数
async function getCityWarningsByArea(warnArea, taisho_chiiki="全国") {
  // 気象庁公式のエリア名・市区町村マスタを動的にロード（これにより数万行の内部データを排除）
  const areaMasterRes = await fetch("https://www.jma.go.jp/bosai/common/const/area.json");
  const areaMaster = await areaMasterRes.json();

  // 取得対象コードの選定（全国の場合は58拠点全て、個別選択ならその府県・管轄のみ）
  let targetCodes = [];
  if (taisho_chiiki === "全国") {
    targetCodes = Object.values(areaCodeMap).flat();
  } else if (areaCodeMap[taisho_chiiki]) {
    targetCodes = areaCodeMap[taisho_chiiki];
  }

  // 各府県のファイルをPromise.allで超高速・並列フェッチ
  const promises = targetCodes.map(code =>
    fetch(`https://www.jma.go.jp/bosai/warning/data/warning/${code}.json`)
      .then(res => res.ok ? res.json() : null)
      .catch(() => null)
  );
  const results = await promises;

  let latestDatetime = null;
  const warnByTypeAndArea = {};
  
  for (const k in warnArea) {
    if (warnArea[k].level !== null) {
      warnByTypeAndArea[warnArea[k].name] = {};
    }
  }

  // 取得した複数拠点分のデータを元の形式（warnInfoオブジェクト）へパース・集約
  for (const json of results) {
    if (!json || !json.issueDatetime) continue;
    if (!latestDatetime || json.issueDatetime > latestDatetime) {
      latestDatetime = json.issueDatetime;
    }
    if (!json.areaTypes || !json.areaTypes[1]) continue;

    const class20Areas = json.areaTypes[1].areas; // 市区町村（Class20）階層
    for (const areaObj of class20Areas) {
      const cityMeta = areaMaster.class20s[areaObj.code];
      if (!cityMeta) continue;

      // セレクトボックスの選択肢名と合致する「親地域名」をマスタから特定
      let parentAreaName = "その他";
      if (areaMaster.offices[cityMeta.parent]) {
        parentAreaName = areaMaster.offices[cityMeta.parent].name;
      } else if (areaMaster.class10s[cityMeta.parent]) {
        parentAreaName = areaMaster.class10s[cityMeta.parent].name;
      }

      // 「鹿児島県（奄美地方を除く）」や「奄美地方」などの特殊な振り分けルールを補正
      if (parentAreaName === "鹿児島県") {
        if (json.prefecturalMeteoOffice === "460040" || areaObj.code.startsWith("465")) {
          parentAreaName = "奄美地方（鹿児島県）";
        } else {
          parentAreaName = "鹿児島県（奄美地方を除く）";
        }
      }

      if (areaObj.warnings) {
        for (const wObj of areaObj.warnings) {
          if (wObj.status === "解除" || wObj.status === "発表なし") continue;
          
          const m = warnArea[wObj.code];
          if (!m || m.level === null) continue;

          const warnName = m.name;
          const cityName = cityMeta.name;

          if (!warnByTypeAndArea[warnName][parentAreaName]) {
            warnByTypeAndArea[warnName][parentAreaName] = [];
          }
          if (!warnByTypeAndArea[warnName][parentAreaName].includes(cityName)) {
            warnByTypeAndArea[warnName][parentAreaName].push(cityName);
          }
        }
      }
    }
  }

  return { 
    warnData: warnByTypeAndArea, 
    regionReportDT: latestDatetime 
  };
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

// 本文コピー機能
document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = document.getElementById("eew").textContent;
  try {
    await navigator.clipboard.writeText(text);
    alert("コピー完了");
  } catch(e) {
    alert("ERROR\n" + e);
  }
});
</script>
