<script>
function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const HH = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("updateTime").textContent = `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

setNowTime();

// 起動・イベント同期用
function update() {
  const modeVal = document.querySelector('input[name="mode"]:checked').value;
  let mode = 2;
  if (modeVal === "keihou") mode = 3;
  if (modeVal === "kiken_keihou") mode = 4;
  
  const areaSelect = document.getElementById("areaSelect").value;
  main(mode, areaSelect);
}
  
async function main(mode=2, taisho_chiiki="全国") {
  try {
    const warnArea = {
      "00":{name:"解除",level:null},
      "02":{name:"暴風雪警報",level:3},
      "03":{name:"レベル３大雨警報",level:3},
      "04":{name:"洪水警報",level:3},
      "05":{name:"暴風警報",level:3},
      "06":{name:"大雪警報",level:3},
      "07":{name:"波浪警報",level:3},
      "08":{name:"レベル３高潮警報",level:3},
      "09":{name:"レベル３土砂災害警報",level:3},
      "10":{name:"レベル２大雨注意報",level:2},
      "12":{name:"大雪注意報",level:2},
      "13":{name:"風雪注意報",level:2},
      "14":{name:"雷注意報",level:2},
      "15":{name:"強風注意報",level:2},
      "16":{name:"波浪注意報",level:2},
      "17":{name:"融雪注意報",level:2},
      "18":{name:"洪水注意報",level:2},
      "19":{name:"レベル２高潮注意報",level:2},
      "20":{name:"濃霧注意報",level:2},
      "21":{name:"乾燥注意報",level:2},
      "22":{name:"なだれ注意報",level:2},
      "23":{name:"低温注意報",level:2},
      "24":{name:"霜注意報",level:2},
      "25":{name:"着氷注意報",level:2},
      "26":{name:"着雪注意報",level:2},
      "27":{name:"その他の注意報",level:2},
      "29":{name:"レベル２土砂災害注意報",level:2},
      "32":{name:"暴風雪特別警報",level:5},
      "33":{name:"レベル５大雨特別警報",level:5},
      "35":{name:"暴風特別警報",level:5},
      "36":{name:"大雪特別警報",level:5},
      "37":{name:"波浪特別警報",level:5},
      "38":{name:"レベル５高潮特別警報",level:5},
      "39":{name:"レベル５土砂災害特別警報",level:5},
      "42":{name:"未定・予約",level:null},
      "43":{name:"レベル４大雨危険警報",level:4},
      "45":{name:"未定・予約",level:null},
      "46":{name:"未定・予約",level:null},
      "47":{name:"未定・予約",level:null},
      "48":{name:"レベル４高潮危険警報",level:4},
      "49":{name:"レベル４土砂災害危険警報",level:4}
    };

    // 修正: パース結果を正しく受け取る
    const { warnData, regionReportDT } = await getCityWarningsByArea(warnArea, taisho_chiiki);
    const data = warnData;

    // 修正: 発表日時が不正（NaN）になるバグを解消
    const dt = new Date(regionReportDT || data.reportDatetime);
    if (isNaN(dt.getTime())) {
      throw new Error("有効な日時データを取得できませんでした。");
    }

    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');

    let titleKind = "";
    if (mode===2) titleKind = "気象警報・注意報";
    else if (mode===3) titleKind = "気象警報";
    else if (mode===4) titleKind = "気象危険/特別警報";
    
    let titleArea1 = "";  
    let titleArea2 = "";
    if (taisho_chiiki==="全国") titleArea1 = "全国の";
    else titleArea2 = "\n"+taisho_chiiki;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${MM}月${dd}日${HH}時${mm}分`;
    if (regionReportDT) text += " 発表";
    else text += " 更新";
    
    let count = 0;
    
    for (const warnName in data.warnInfo) {
      const areas = data.warnInfo[warnName];
      if (Object.keys(areas).length === 0) continue;

      const info = Object.values(warnArea).find(w => w.name === warnName);
      if (!info || info.level < mode) continue;

      let block = "";
      let hasArea = false;

      for (const areaName in areas) {
        // 地域選択フィルタ
        if (taisho_chiiki !== "全国" && areaName !== taisho_chiiki) continue;
        
        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;

        if (!hasArea) {
          const coloredName = `${getWarnColor(info.level)}${warnName}${getWarnColor(info.level)}`;
          block += `\n\n${coloredName}`;
          hasArea = true;
          count++;
        }

        block += `\n【${areaName}】\n`;
        block += cities.join("　");
      }

      text += block;
    }

    if (count===0) {
      if (mode===2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (mode===3) text += "\n\n発表中の気象警報はありません。";
      else if (mode===4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch(e) {
    document.getElementById("eew").textContent = "エラーが発生しました:\n" + e.message;
    console.error(e);
  }
}

async function getCityWarningsByArea(warnArea, taisho_chiiki="全国") {
  const res = await fetch('https://www.jma.go.jp/bosai/warning/data/warning/map.json');
  const dataJson = await res.json();

  // 市町村コード対応表

    "0110000":{"name":"札幌市","parent":"016012"},"0120200":{"name":"函館市","parent":"017012"},"0120300":{"name":"小樽市","parent":"016031"},"0120400":{"name":"旭川市","parent":"012012"},"0120500":{"name":"室蘭市","parent":"015012"},"0120601":{"name":"釧路市釧路","parent":"014024"},"0120602":{"name":"釧路市阿寒","parent":"014022"},"0120603":{"name":"釧路市音別","parent":"014024"},"0120700":{"name":"帯広市","parent":"014032"},"0120801":{"name":"北見市北見","parent":"013020"},"0120802":{"name":"北見市常呂","parent":"013011"},"0120900":{"name":"夕張市","parent":"016023"},"0121000":{"name":"岩見沢市","parent":"016023"},"0121100":{"name":"網走市","parent":"013011"},"0121200":{"name":"留萌市","parent":"012023"},"0121300":{"name":"苫小牧市","parent":"015012"},"0121400":{"name":"稚内市","parent":"011011"},"0121500":{"name":"美唄市","parent":"016023"},"0121600":{"name":"芦別市","parent":"016022"},"0121700":{"name":"江別市","parent":"016012"},"0121800":{"name":"赤平市","parent":"016022"},"0121900":{"name":"紋別市","parent":"013031"},"0122000":{"name":"士別市","parent":"012011"},"0122100":{"name":"名寄市","parent":"012011"},"0122200":{"name":"三笠市","parent":"016023"},"0122300":{"name":"根室市","parent":"014013"},"0122400":{"name":"千歳市","parent":"016013"},"0122500":{"name":"滝川市","parent":"016022"},"0122600":{"name":"砂川市","parent":"016022"},"0122700":{"name":"歌志内市","parent":"016022"},"0122800":{"name":"深川市","parent":"016021"},"0122900":{"name":"富良野市","parent":"012013"},"0123000":{"name":"登別市","parent":"015012"},"0123100":{"name":"恵庭市","parent":"016013"},"0123301":{"name":"伊達市伊達","parent":"015011"},"0123302":{"name":"伊達市大滝","parent":"015011"},"0123400":{"name":"北広島市","parent":"016013"},"0123500":{"name":"石狩市","parent":"016011"},"0123600":{"name":"北斗市","parent":"017012"},"0130300":{"name":"当別町","parent":"016011"},"0130400":{"name":"新篠津村","parent":"016011"},"0133100":{"name":"松前町","parent":"017013"},"0133200":{"name":"福島町","parent":"017013"},"0133300":{"name":"知内町","parent":"017013"},"0133400":{"name":"木古内町","parent":"017013"},"0133700":{"name":"七飯町","parent":"017012 "0156100":{"name":"興部町","parent":"013031"},"0156200":{"name":"西興部村","parent":"013031"},"0156300":{"name":"雄武町","parent":"013031"},"0156400":{"name":"大空町","parent":"013011"},"0157100":{"name":"豊浦町","parent":"015011"},"0157500":{"name":"壮瞥町","parent":"015011"},"0157800":{"name":"白老町","parent":"015012"},"0158100":{"name":"厚真町","parent":"015013"},"0158400":{"name":"洞爺湖町","parent":"015011"},"0158500":{"name":"安平町","parent":"015013"},"0158600":{"name":"むかわ町","parent":"015013"},"0160101":{"name":"日高町日高","parent":"015021"},"0160102":{"name":"日高町門別","parent":"015021"},"0160200":{"name":"平取町","parent":"015021"},"0160400":{"name":"新冠町","parent":"015022"},"0160700":{"name":"浦河町","parent":"015023"},"0160800":{"name":"様似町","parent":"015023"},"0160900":{"name":"えりも町","parent":"015023"},"0161000":{"name":"新ひだか町","parent":"015022"},"0163100":{"name":"音更町","parent":"014032"},"0163200":{"name":"士幌町","parent":"014032"},"0163300":{"name":"上士幌町","parent":"014031"},"0163400":{"name":"鹿追町","parent":"014031"},"0163500":{"name":"新得町","parent":"014031"},"0163600":{"name":"清水町","parent":"014032"},"0163700":{"name":"芽室町","parent":"014032"},"0163800":{"name":"中札内村","parent":"014033"},"0163900":{"name":"更別村","parent":"014033"},"0164100":{"name":"大樹町","parent":"014033"},"0164200":{"name":"広尾町","parent":"014033"},"0164300":{"name":"幕別町","parent":"014032"},"0164400":{"name":"池田町","parent":"014032"},"0164500":{"name":"豊頃町","parent":"014033"}
  };

  let regionReportDT = null;
  const warnByTypeAndArea = {};

  // 全ての警報名で初期化

    if (warnArea[code].name !== "解除") {
      warnByTypeAndArea[warnArea[code].name] = {};
    }
  }

  // 修正: map.jsonは「配列」なので、正しく全体をループ処理する
  dataJson.forEach(region => {
    if (region.reportDatetime) {
      reportDatetime = region.reportDatetime;
    }

    const areaName = region.areaName; // 例: "石狩・空知・後志地方", "東京都"
    
    if (!region.warnings) return;

    region.warnings.forEach(cityWarn => {
      const cityCode = cityWarn.cityCode;
      let cityName = cityWarn.cityName;

      // 必要に応じてマッピングを補完
      if (codeToCityMap[cityCode]) {
        cityName = codeToCityMap[cityCode].name;
      }

      if (!cityWarn.items) return;

      cityWarn.items.forEach(item => {
        const code = item.kind.code;
        const warnConfig = warnArea[code];

        // 現在発表中の有効な注意報・警報をパースして格納
        if (warnConfig && warnConfig.name !== "解除" && warnConfig.level !== null) {
          const warnName = warnConfig.name;

          if (!warnByTypeAndArea[warnName][areaName]) {
            warnByTypeAndArea[warnName][areaName] = [];
          }
          if (!warnByTypeAndArea[warnName][areaName].includes(cityName)) {
            warnByTypeAndArea[warnName][areaName].push(cityName);
          }
        }
      });
    });
  });

  const warnData = { "reportDatetime": reportDatetime, "warnInfo": warnByTypeAndArea };
  return { warnData, regionReportDT };
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

// イベント設定
window.addEventListener("load", update);

document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = document.getElementById("eew").textContent;
  try {
    await navigator.clipboard.writeText(text);
    alert("コピー完了");
  } catch(e) {
    alert("ERROR\n"+e);
  }
});

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", update);
});

document.getElementById("areaSelect").addEventListener("change", update);
</script>
</body>
</html>
