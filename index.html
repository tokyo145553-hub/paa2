<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象警報ビューアーv3.2.0 (個別詳細XML直接解析版)</title>
<style>
body {
  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;
  white-space: pre-wrap;
  margin: 5px;
  padding: 5px;
  background: #fff;
  font-size: 14px;
  line-height: 1.4;
}
#eew { 
  margin: 0; 
  padding: 0; 
  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-wrap: anywhere;
}
#copyBtn {
  font-size: 12px;
  padding: 2px 5px;
  margin-bottom: 5px;
  cursor: pointer;
}
#areaSelect {
  font-size: 12px;
  padding: 10px 10px;
  margin-bottom: 5px;
  cursor: pointer;
}
.control-panel {
  margin-bottom: 10px;
}
</style>
</head>
<body>
<div id="updateTime">取得日時: ----/--/-- --:--:--</div>
<div class="control-panel">
  <button id="copyBtn">本文をコピー</button>
  <select id="areaSelect">
    <option selected>全国</option>
    <optgroup label="沖縄地方">
      <option>沖縄本島地方</option>
      <option>大東島地方</option>
      <option>宮古島地方</option>
      <option>八重山地方</option>
    </optgroup>
    <optgroup label="関東甲信地方">
      <option>東京都</option>
      <option>神奈川県</option>
      <option>埼玉県</option>
      <option>千葉県</option>
    </optgroup>
  </select>

  <label><input type="radio" name="mode" value="all"> 全情報</label>
  <label><input type="radio" name="mode" value="keihou" checked> 警報以上</label>
  <label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>
</div>

<pre id="eew">XMLを解析中...</pre>

<script>
// 警報・注意報のマスターテーブル（警戒レベル付きのカスタム名称にマッピング）
const warnDefinition = {
  "02": { name: "レベル３暴風雪警報", level: 3, raw: "暴風雪警報" },
  "03": { name: "レベル３大雨警報", level: 3, raw: "大雨警報" },
  "04": { name: "レベル３洪水警報", level: 3, raw: "洪水警報" },
  "05": { name: "レベル３暴風警報", level: 3, raw: "暴風警報" },
  "06": { name: "レベル３大雪警報", level: 3, raw: "大雪警報" },
  "07": { name: "レベル３波浪警報", level: 3, raw: "波浪警報" },
  "08": { name: "レベル３高潮警報", level: 3, raw: "高潮警報" },
  "09": { name: "レベル３土砂災害警報", level: 3, raw: "土砂災害警報" },
  "10": { name: "レベル２大雨注意報", level: 2, raw: "大雨注意報" },
  "12": { name: "レベル２大雪注意報", level: 2, raw: "大雪注意報" },
  "13": { name: "レベル２風雪注意報", level: 2, raw: "風雪注意報" },
  "14": { name: "レベル２雷注意報", level: 2, raw: "雷注意報" },
  "15": { name: "レベル２強風注意報", level: 2, raw: "強風注意報" },
  "16": { name: "レベル２波浪注意報", level: 2, raw: "波浪注意報" },
  "17": { name: "レベル２融雪注意報", level: 2, raw: "融雪注意報" },
  "18": { name: "レベル２洪水注意報", level: 2, raw: "洪水注意報" },
  "19": { name: "レベル２高潮注意報", level: 2, raw: "高潮注意報" },
  "20": { name: "レベル２濃霧注意報", level: 2, raw: "濃霧注意報" },
  "21": { name: "レベル２乾燥注意報", level: 2, raw: "乾燥注意報" },
  "22": { name: "レベル２なだれ注意報", level: 2, raw: "なだれ注意報" },
  "23": { name: "レベル２低温注意報", level: 2, raw: "低温注意報" },
  "24": { name: "レベル２霜注意報", level: 2, raw: "霜注意報" },
  "25": { name: "レベル２着氷注意報", level: 2, raw: "着氷注意報" },
  "26": { name: "レベル２着雪注意報", level: 2, raw: "着雪注意報" },
  "29": { name: "レベル２土砂災害注意報", level: 2, raw: "土砂災害注意報" },
  "32": { name: "レベル５暴風雪特別警報", level: 5, raw: "暴風雪特別警報" },
  "33": { name: "レベル５大雨特別警報", level: 5, raw: "大雨特別警報" },
  "35": { name: "レベル５暴風特別警報", level: 5, raw: "暴風特別警報" },
  "36": { name: "レベル５大雪特別警報", level: 5, raw: "大雪特別警報" },
  "37": { name: "レベル５波浪特別警報", level: 5, raw: "波浪特別警報" },
  "38": { name: "レベル５高潮特別警報", level: 5, raw: "高潮特別警報" },
  "39": { name: "レベル５土砂災害特別警報", level: 5, raw: "土砂災害特別警報" },
  "43": { name: "レベル４大雨危険警報", level: 4, raw: "大雨危険警報" },
  "48": { name: "レベル４高潮危険警報", level: 4, raw: "高潮危険警報" },
  "49": { name: "レベル４土砂災害危険警報", level: 4, raw: "土砂災害危険警報" }
};

function setNowTime() {
  const now = new Date();
  document.getElementById("updateTime").textContent = `取得日時: ${now.toLocaleString('ja-JP')}`;
}

async function update() {
  setNowTime();
  const modeVal = document.querySelector('input[name="mode"]:checked').value;
  let modeLevel = 2;
  if (modeVal === "keihou") modeLevel = 3;
  if (modeVal === "kiken_keihou") modeLevel = 4;

  const areaSelect = document.getElementById("areaSelect").value;
  await parseJmaXml(modeLevel, areaSelect);
}

// 気象庁詳細XML（VPWW54など）を直接FetchしてDOMパースするコアロジック
async function parseJmaXml(modeLevel = 3, taisho_chiiki = "全国") {
  try {
    // 1. 高頻度フィード（extra.xml）から最新の情報を手繰る、または特定の詳細XMLを直接フェッチ
    // ※ここでは「目次フィードから自動で直近の詳細電文を追う仕組み」をベースに、渡されたXMLを完全解析します。
    const feedUrl = 'https://www.data.jma.go.jp/developer/xml/feed/extra.xml';
    const feedRes = await fetch(feedUrl);
    const feedText = await feedRes.text();
    
    const parser = new DOMParser();
    const feedDoc = parser.parseFromString(feedText, "text/xml");
    const entries = feedDoc.getElementsByTagName("entry");

    const allWarnData = {};
    let latestReportTime = "";
    let xmlParsedCount = 0;

    // フィードに載っている直近の電文URLを走査
    for (let i = 0; i < entries.length; i++) {
      if (xmlParsedCount >= 5) break; // 直近5件の詳細XMLをマージ

      const title = entries[i].getElementsByTagName("title")[0]?.textContent;
      if (title && (title.includes("気象警報・注意報") || title.includes("気象特別警報・警報・注意報"))) {
        const xmlLink = entries[i].getElementsByTagName("link")[0]?.getAttribute("href");
        if (!xmlLink) continue;

        // 【ここがポイント】ご提示いただいたような詳細XML（VPWW54等）を直接Fetchして解析
        const detailRes = await fetch(xmlLink);
        const detailText = await detailRes.text();
        const detailDoc = parser.parseFromString(detailText, "text/xml");

        // 電文の正確な発表時刻（<ReportDateTime>）を取得してJST（日本時間）にパース
        const reportTimeEle = detailDoc.getElementsByTagName("ReportDateTime")[0];
        if (reportTimeEle && !latestReportTime) {
          const dt = new Date(reportTimeEle.textContent);
          latestReportTime = `${String(dt.getMonth() + 1).padStart(2, '0')}月${String(dt.getDate()).padStart(2, '0')}日${String(dt.getHours()).padStart(2, '0')}時${String(dt.getMinutes()).padStart(2, '0')}分`;
        }

        // XML内部の <Item> タグ（発表地域ブロック）を一網打尽にする
        const items = detailDoc.getElementsByTagName("Item");
        for (let j = 0; j < items.length; j++) {
          const item = items[j];
          
          // 親エリア名（例: 沖縄本島地方、大東島地方、東京都など）
          const parentAreaName = item.getElementsByTagName("Area")[0]?.getElementsByTagName("Name")[0]?.textContent;
          if (!parentAreaName) continue;

          // 発表されている警報・注意報（<Kind>）のパース
          const kinds = item.getElementsByTagName("Kind");
          for (let k = 0; k < kinds.length; k++) {
            const kind = kinds[k];
            const rawWarnName = kind.getElementsByTagName("Name")[0]?.textContent;
            const status = kind.getElementsByTagName("Status")[0]?.textContent || "";

            // 「解除」や「発表なし」のフラグが立っているコードは除外
            if (!rawWarnName || status.includes("解除") || status.includes("なし")) continue;

            // 定義マスターからレベル付きのカスタム名にマッピング
            let customName = rawWarnName;
            for (const code in warnDefinition) {
              if (warnDefinition[code].raw === rawWarnName) {
                customName = warnDefinition[code].name;
                break;
              }
            }

            // <Areas> の中に入っている、具体的な市区町村名（例: 那覇市、南大東村）の配列を作成
            const subAreas = item.getElementsByTagName("Areas")[0]?.getElementsByTagName("Area");
            const cityNames = [];
            if (subAreas && subAreas.length > 0) {
              for (let m = 0; m < subAreas.length; m++) {
                const name = subAreas[m].getElementsByTagName("Name")[0]?.textContent;
                if (name) cityNames.push(name);
              }
            } else {
              // 市区町村階層が無い場合は、親エリア名を入れる
              cityNames.push(parentAreaName);
            }

            // 解析したデータをメモリ上のツリー構造に集約
            if (!allWarnData[customName]) allWarnData[customName] = {};
            if (!allWarnData[customName][parentAreaName]) allWarnData[customName][parentAreaName] = [];
            
            cityNames.forEach(city => {
              if (!allWarnData[customName][parentAreaName].includes(city)) {
                allWarnData[customName][parentAreaName].push(city);
              }
            });
          }
        }
        xmlParsedCount++;
      }
    }

    // 2. 出力用テキストの構築
    if (!latestReportTime) {
      const now = new Date();
      latestReportTime = `${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日${String(now.getHours()).padStart(2,'0')}時${String(now.getMinutes()).padStart(2,'0')}分`;
    }

    let titleKind = "気象警報・注意報";
    if (modeLevel === 3) titleKind = "気象警報";
    if (modeLevel === 4) titleKind = "気象危険/特別警報";

    let titleArea1 = (taisho_chiiki === "全国") ? "全国の" : "";
    let titleArea2 = (taisho_chiiki === "全国") ? "" : "\n" + taisho_chiiki;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${latestReportTime} 発表`;
    let matchCount = 0;

    // マスターのレベル順（警報・注意報ごと）にループを回してテキストを生成
    for (const code in warnDefinition) {
      const def = warnDefinition[code];
      if (def.level < modeLevel) continue; // ラジオボタンによるレベルフィルタリング

      const areas = allWarnData[def.name];
      if (!areas || Object.keys(areas).length === 0) continue;

      let block = "";
      let hasArea = false;

      for (const areaName in areas) {
        // プルダウンによる地域選択フィルタリング（「大東島地方」などの部分一致に対応）
        if (taisho_chiiki !== "全国" && !areaName.includes(taisho_chiiki) && !taisho_chiiki.includes(areaName)) continue;

        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;

        if (!hasArea) {
          const color = getWarnColor(def.level);
          block += `\n\n${color}${def.name}${color}`;
          hasArea = true;
          matchCount++;
        }

        block += `\n【${areaName}】\n`;
        block += cities.join("　");
      }
      text += block;
    }

    // 1件も該当がなかった場合
    if (matchCount === 0) {
      if (modeLevel === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (modeLevel === 3) text += "\n\n発表中の気象警報はありません。";
      else if (modeLevel === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch(e) {
    document.getElementById("eew").textContent = "XMLパースエラーが発生しました:\n" + e;
  }
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

// 起動時および操作時のイベント登録
window.addEventListener("load", update);
document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", update));
document.getElementById("areaSelect").addEventListener("change", update);
document.getElementById("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(document.getElementById("eew").textContent);
    alert("コピー完了！");
  } catch(e) { alert("コピー失敗: " + e); }
});
</script>
</body>
</html>
