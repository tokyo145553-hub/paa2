<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象警報ビューアーv2.2.1</title>
<style>

  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;

  margin: 5px;
  padding: 5px;
  background: #fff;
  font-size: 14px;

}

  padding: 0; 
  font-family:"Yu Gothic","YuGothic","メイリオ",sans-serif;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-wrap: anywhere;
}

  font-size: 12px;
  padding: 2px 5px;
  margin-bottom: 0px;
  cursor: pointer;
}
#areaSelect {
  font-size: 12px;
  padding: 10px 10px;
  margin-bottom: 0px;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="updateTime">取得日時: ----/--/-- --:--:--</div>
<button id="copyBtn">&nbsp;<br>　　　本文をコピー　　　<br>&nbsp;</button>
<select id="areaSelect">

  <optgroup label="北海道地方">

  </optgroup>
  <optgroup label="東海地方">
    <option value="210000">岐阜県</option>

  <optgroup label="中国地方">
    <option value="310000">鳥取県</option>

    <option value="330000">岡山県</option>
    <option value="340000">広島県</option>
    <option value="350000">山口県</option>
  </optgroup>
  <optgroup label="四国地方">
    <option value="360000">徳島県</option>
    <option value="370000">香川県</option>
    <option value="380000">愛媛県</option>
    <option value="390000">高知県</option>
  </optgroup>
  <optgroup label="九州地方">
    <option value="400000">福岡県</option>
    <option value="410000">佐賀県</option>
    <option value="420000">長崎県</option>
    <option value="430000">熊本県</option>
    <option value="440000">大分県</option>
    <option value="450000">宮崎県</option>
    <option value="460100">鹿児島県（奄美地方を除く）</option>
    <option value="460040">奄美地方（鹿児島県）</option>
  </optgroup>
  <optgroup label="沖縄地方">
    <option value="471000">沖縄本島地方</option>
    <option value="472000">大東島地方</option>
    <option value="473000">宮古島地方</option>
    <option value="474000">八重山地方</option>
  </optgroup>
</select>

<label><input type="radio" name="mode" value="all"> 全情報</label>
<label><input type="radio" name="mode" value="keihou" checked> 警報以上</label>
<label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>

<pre id="eew">読み込み中...</pre>

<script>
// 気象庁のエリア定義を動的に引っ張るためのマスタ
const targetOffices = [
  "011000","012000","013000","014010","014030","015000","016010","017000",
  "020000","030000","040000","050000","060000","070000","080000","090000",
  "100000","110000","120000","130000","140000","150000","160000","170000",
  "180000","190000","200000","210000","220000","230000","240000","250000",
  "260000","270000","280000","290000","300000","310000","320000","330000",
  "340000","350000","360000","370000","380000","390000","400000","410000",
  "420000","430000","440000","450000","460100","460040","471000","472000",
  "473000","474000"
];

function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const HH = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("updateTime").textContent = `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

setNowTime();

const warnAreaMaster = {
  "02":{name:"暴風雪警報",level:3},
  "03":{name:"レベル３大雨警報",level:3},
  "04":{name:"洪水警報",level:3},
  "05":{name:"暴風警報",level:3},
  "06":{name:"大雪警報",level:3},
  "07":{name:"波浪警報",level:3},
  "08":{name:"レベル３高潮警報",level:3},
  "09":{name:"レベル３土砂災害警報",level:3},
  "10":{name:"レベル２大雨注意報",level:2},
  "12":{name:"大雪注意報",level:2},
  "13":{name:"風雪注意報",level:2},
  "14":{name:"雷注意報",level:2},
  "15":{name:"強風注意報",level:2},
  "16":{name:"波浪注意報",level:2},
  "17":{name:"融雪注意報",level:2},
  "18":{name:"洪水注意報",level:2},
  "19":{name:"レベル２高潮注意報",level:2},
  "20":{name:"濃霧注意報",level:2},
  "21":{name:"乾燥注意報",level:2},
  "22":{name:"なだれ注意報",level:2},
  "23":{name:"低温注意報",level:2},
  "24":{name:"霜注意報",level:2},
  "25":{name:"着氷注意報",level:2},
  "26":{name:"着雪注意報",level:2},
  "27":{name:"その他の注意報",level:2},
  "29":{name:"レベル２土砂災害注意報",level:2},
  "32":{name:"暴風雪特別警報",level:5},
  "33":{name:"レベル５大雨特別警報",level:5},
  "35":{name:"暴風特別警報",level:5},
  "36":{name:"大雪特別警報",level:5},
  "37":{name:"波浪特別警報",level:5},
  "38":{name:"レベル５高潮特別警報",level:5},
  "39":{name:"レベル５土砂災害特別警報",level:5},
  "43":{name:"レベル４大雨危険警報",level:4},
  "48":{name:"レベル４高潮危険警報",level:4},
  "49":{name:"レベル４土砂災害危険警報",level:4}
};

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

async function update() {
  setNowTime();
  document.getElementById("eew").textContent = "最新データを同期中...";

  const modeRadio = document.querySelector('input[name="mode"]:checked').value;
  let modeLevel = 2;
  if (modeRadio === "keihou") modeLevel = 3;
  if (modeRadio === "kiken_keihou") modeLevel = 4;

  const selectEl = document.getElementById("areaSelect");
  const selectedValue = selectEl.value; // "全国" または 各エリアコード
  const selectedText = selectEl.options[selectEl.selectedIndex].text;

  // 1. 取得対象のエリアコードを決定
  let fetchCodes = [];
  if (selectedValue === "全国") {
    fetchCodes = targetOffices;
  } else {
    fetchCodes = [selectedValue];
  }

  try {
    // 2. 地域定義マスタ(area.json)を気象庁から取得（直書き市町村コードの全削除に成功）
    const areaMasterRes = await fetch("https://www.jma.go.jp/bosai/common/const/area.json");
    const areaMaster = await areaMasterRes.json();

    // 3. 対象エリアの警報JSONを並列でフェッチ
    const promises = fetchCodes.map(code => 
      fetch(`https://www.jma.go.jp/bosai/warning/data/warning/${code}.json`)
        .then(res => res.ok ? res.json() : null)
        .catch(() => null)
    );
    const results = await promises;

    let latestReportDatetime = null;
    // 分類用の器を用意: { "レベル３大雨警報": { "東京都": ["新宿区", "渋谷区"] } }
    const mergedWarnInfo = {};
    for (const k in warnAreaMaster) {
      mergedWarnInfo[warnAreaMaster[k].name] = {};
    }

    // 4. 取得した各地域のJSONデータを解析・マージ
    for (const json of results) {
      if (!json || !json.issueDatetime) continue;

      if (!latestReportDatetime || json.issueDatetime > latestReportDatetime) {
        latestReportDatetime = json.issueDatetime;
      }

      if (!json.areaTypes || !json.areaTypes[1]) continue;
      // areaTypes[1] が市町村ごとの発表階層（class20s）
      const class20Areas = json.areaTypes[1].areas;

      for (const areaObj of class20Areas) {
        const cityCode = areaObj.code;
        const cityMeta = areaMaster.class20s[cityCode];
        if (!cityMeta) continue;

        // 親となる「東京地方」「青森県」などの大きなまとまり名を取得
        const parentCode = cityMeta.parent;
        let largeAreaName = "その他";
        if (areaMaster.offices[parentCode]) {
          largeAreaName = areaMaster.offices[parentCode].name;
        } else if (areaMaster.class10s[parentCode]) {
          largeAreaName = areaMaster.class10s[parentCode].name;
        }

        const cityName = cityMeta.name;

        // 現在その自治体に発表されている警報コード（codes）を抽出
        if (areaObj.warnings) {
          for (const warnObj of areaObj.warnings) {
            // statusが「解除」または「発表なし」の場合は無視
            if (warnObj.status === "解除" || warnObj.status === "発表なし") continue;
            
            const master = warnAreaMaster[warnObj.code];
            if (!master || master.level < modeLevel) continue;

            if (!mergedWarnInfo[master.name][largeAreaName]) {
              mergedWarnInfo[master.name][largeAreaName] = [];
            }
            if (!mergedWarnInfo[master.name][largeAreaName].includes(cityName)) {
              mergedWarnInfo[master.name][largeAreaName].push(cityName);
            }
          }
        }
      }
    }

    // 5. テキスト出力の作成
    const dt = latestReportDatetime ? new Date(latestReportDatetime) : new Date();
    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');

    let titleKind = "気象警報・注意報";
    if (modeLevel === 3) titleKind = "気象警報";
    if (modeLevel === 4) titleKind = "気象危険/特別警報";

    let titleArea1 = (selectedValue === "全国") ? "全国の" : "";
    let titleArea2 = (selectedValue === "全国") ? "" : "\n" + selectedText;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${MM}月${dd}日${HH}時${mm}分 更新`;
    let count = 0;

    for (const warnName in mergedWarnInfo) {
      const areas = mergedWarnInfo[warnName];
      if (Object.keys(areas).length === 0) continue;

      const info = Object.values(warnAreaMaster).find(w => w.name === warnName);
      const coloredName = `${getWarnColor(info.level)}${warnName}${getWarnColor(info.level)}`;

      text += `\n\n${coloredName}`;

      for (const areaName in areas) {
        text += `\n【${areaName}】\n`;
        text += areas[areaName].join("　");
      }
      count++;
    }

    if (count === 0) {
      if (modeLevel === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (modeLevel === 3) text += "\n\n発表中の気象警報はありません。";
      else if (modeLevel === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();

  } catch (e) {
    console.error(e);
    document.getElementById("eew").textContent = "通信エラーまたは解析エラーが発生しました:\n" + e;
  }
}

// 各種イベントリスナー登録
window.addEventListener("load", update);
document.getElementById("areaSelect").addEventListener("change", update);
document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", update);
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = document.getElementById("eew").textContent;
  try {
    await navigator.clipboard.writeText(text);
    alert("コピー完了");
  } catch(e) {
    alert("ERROR\n" + e);
  }
});
</script>
</body>
</html>
