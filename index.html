<label><input type="radio" name="mode" value="all"> 全情報</label>

<label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>

<pre id="eew">読み込み中...</pre>

<script>
// --- 市区町村コードの対照用巨大マッピングデータ ---
const cityMapData = {"0110000":{"name":"札幌市","parent":"016012"},"0120200":{"name":"函館市","parent":"017012"},"0120300":{"name":"小樽市","parent":"016031"},"0120400":{"name":"旭川市","parent":"012012"},"0120500":{"name":"室蘭市","parent":"015012"},"0120601":{"name":"釧路市","parent":"014024"},"0120700":{"name":"帯広市","parent":"014032"},"0121100":{"name":"網走市","parent":"013011"},"0121400":{"name":"稚内市","parent":"011011"}}; // 容量削減のため主要サンプル（実際は気象庁エリアに紐付き自動判定）

const warnAreaMaster = {
  "02":{name:"暴風雪警報",level:3}, "03":{name:"大雨警報",level:3}, "04":{name:"洪水警報",level:3},
  "05":{name:"暴風警報",level:3}, "06":{name:"大雪警報",level:3}, "07":{name:"波浪警報",level:3},
  "08":{name:"高潮警報",level:3}, "09":{name:"土砂災害警報",level:3}, "10":{name:"大雨注意報",level:2},
  "12":{name:"大雪注意報",level:2}, "13":{name:"風雪注意報",level:2}, "14":{name:"雷注意報",level:2},
  "15":{name:"強風注意報",level:2}, "16":{name:"波浪注意報",level:2}, "17":{name:"融雪注意報",level:2},
  "18":{name:"洪水注意報",level:2}, "19":{name:"高潮注意報",level:2}, "20":{name:"濃霧注意報",level:2},
  "21":{name:"乾燥注意報",level:2}, "22":{name:"なだれ注意報",level:2}, "23":{name:"低温注意報",level:2},
  "24":{name:"霜注意報",level:2}, "25":{name:"着氷注意報",level:2}, "26":{name:"着雪注意報",level:2},
  "27":{name:"その他の注意報",level:2}, "29":{name:"土砂災害注意報",level:2}, "32":{name:"暴風雪特別警報",level:5},
  "33":{name:"大雨特別警報",level:5}, "35":{name:"暴風特別警報",level:5}, "36":{name:"大雪特別警報",level:5},
  "37":{name:"波浪特別警報",level:5}, "38":{name:"高潮特別警報",level:5}, "39":{name:"土砂災害特別警報",level:5},
  "43":{name:"大雨危険警報",level:4}, "48":{name:"高潮危険警報",level:4}, "49":{name:"土砂災害危険警報",level:4}
};

function setNowTime() {
  const now = new Date();
  document.getElementById("updateTime").textContent = `取得日時: ${now.toLocaleDateString('ja-JP')} ${now.toLocaleTimeString('ja-JP')}`;
}

async function update() {
  setNowTime();
  const modeVal = document.querySelector('input[name="mode"]:checked').value;
  let mode = 2;
  if (modeVal === "keihou") mode = 3;
  if (modeVal === "kiken_keihou") mode = 4;
  
  const areaSelect = document.getElementById("areaSelect").value;
  await main(mode, areaSelect);
}

async function main(mode=2, taisho_chiiki="全国") {
  try {
    // 1. 気象庁からリアルタイム警報データをパース
    const res = await fetch('https://www.jma.go.jp/bosai/warning/data/warning/map.json');
    const dataJson = await res.json();
    
    let reportDatetimeJST = "";
    const parsedWarnInfo = {};

    // 2. 日本時間をパースするヘルパー
    if (dataJson && dataJson.length > 0 && dataJson[0].reportDatetime) {
      const dt = new Date(dataJson[0].reportDatetime);
      const MM = String(dt.getMonth() + 1).padStart(2, '0');
      const dd = String(dt.getDate()).padStart(2, '0');
      const HH = String(dt.getHours()).padStart(2, '0');
      const mm = String(dt.getMinutes()).padStart(2, '0');
      reportDatetimeJST = `${MM}月${dd}日${HH}時${mm}分`;
    } else {
      const now = new Date();
      reportDatetimeJST = `${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日${String(now.getHours()).padStart(2,'0')}時${String(now.getMinutes()).padStart(2,'0')}分`;
    }

    // 各都道府県別のループ処理
    dataJson.forEach(prov => {
      if(!prov.areaTypes) return;
      prov.areaTypes.forEach(type => {
        if(type.areas) {
          type.areas.forEach(area => {
            const areaName = area.area.name; 
            if(area.warnings) {
              area.warnings.forEach(warn => {
                // 状態コード「00(解除/発表なし)」はスキップ
                if(warn.status === "解除" || warn.code === "00") return;
                
                const master = warnAreaMaster[warn.code];
                if(!master || master.level < mode) return;

                if(!parsedWarnInfo[master.name]) parsedWarnInfo[master.name] = {};
                if(!parsedWarnInfo[master.name][areaName]) parsedWarnInfo[master.name][areaName] = [];
                
                // 重複を防ぐ
                if(!parsedWarnInfo[master.name][areaName].includes(areaName)) {
                  parsedWarnInfo[master.name][areaName].push(areaName);
                }
              });
            }
          });
        }
      });
    });

    // 3. テキストの構築
    let titleKind = "気象警報・注意報";
    if (mode === 3) titleKind = "気象警報";
    if (mode === 4) titleKind = "気象危険/特別警報";
    
    let titleArea1 = taisho_chiiki === "全国" ? "全国の" : "";
    let titleArea2 = taisho_chiiki === "全国" ? "" : "\n" + taisho_chiiki;

    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${reportDatetimeJST} 発表`;
    
    let count = 0;
    for (const warnName in parsedWarnInfo) {
      const areas = parsedWarnInfo[warnName];
      let block = "";
      let hasArea = false;

      for (const areaName in areas) {
        // 地域フィルタ
        if (taisho_chiiki !== "全国" && !areaName.includes(taisho_chiiki) && !taisho_chiiki.includes(areaName)) continue;
        
        if (!hasArea) {
          const info = Object.values(warnAreaMaster).find(w => w.name === warnName);
          const color = info ? getWarnColor(info.level) : "◆";
          block += `\n\n${color}${warnName}${color}`;
          hasArea = true;
          count++;
        }
        block += `\n【${areaName}】`;
      }
      text += block;
    }

    if (count === 0) {
      if (mode === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (mode === 3) text += "\n\n発表中の気象警報はありません。";
      else if (mode === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch(e) {
    document.getElementById("eew").textContent = "エラーが発生しました:\n" + e;
  }
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

// イベントリスナーのバインド
window.addEventListener("load", update);
document.querySelectorAll('input[name="mode"]').forEach(radio => radio.addEventListener("change", update));
document.getElementById("areaSelect").addEventListener("change", update);
document.getElementById("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(document.getElementById("eew").textContent);
    alert("コピー完了");
  } catch(e) {
    alert("コピーに失敗しました: " + e);
  }
});
</script>
